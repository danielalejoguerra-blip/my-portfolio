# ─── Este archivo va en el nginx del HOST, no en Docker ─────────────────────
# Cópialo en: /etc/nginx/sites-available/danielwar.tech
# Luego: sudo ln -s /etc/nginx/sites-available/danielwar.tech /etc/nginx/sites-enabled/
# Y: sudo nginx -t && sudo systemctl reload nginx

# ─── HTTP → redirect to HTTPS ───────────────────────────────────────────────
server {
    listen 80;
    server_name danielwar.tech www.danielwar.tech;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── HTTPS ───────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2  on;
    server_name danielwar.tech www.danielwar.tech;

    ssl_certificate     /etc/letsencrypt/live/danielwar.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/danielwar.tech/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header X-Frame-Options           "SAMEORIGIN"  always;
    add_header X-Content-Type-Options    "nosniff"     always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Gzip
    gzip            on;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml image/svg+xml;
    gzip_min_length 1000;

    # Static assets (Next.js los hashea — caché permanente)
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3001/_next/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Todo lo demás → Next.js en Docker
    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
