services:
  frontend:
    image: ${DOCKER_IMAGE:-danielwar01/portfolio-frontend:latest}
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_BACKEND_URL:             ${NEXT_PUBLIC_BACKEND_URL}
        NEXT_PUBLIC_ANALYTICS_SOCKET_URL:    ${NEXT_PUBLIC_ANALYTICS_SOCKET_URL}
        NEXT_PUBLIC_ANALYTICS_SOCKET_PATH:   ${NEXT_PUBLIC_ANALYTICS_SOCKET_PATH}
        NEXT_PUBLIC_ANALYTICS_NAMESPACE:     ${NEXT_PUBLIC_ANALYTICS_NAMESPACE}
        NEXT_PUBLIC_ANALYTICS_ROOM:          ${NEXT_PUBLIC_ANALYTICS_ROOM}
        NEXT_PUBLIC_ANALYTICS_REALTIME_DAYS: ${NEXT_PUBLIC_ANALYTICS_REALTIME_DAYS}
    container_name: portfolio-frontend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - REACT_API_HOST=${REACT_API_HOST}
    # Puerto solo expuesto al host para debugging local; nginx lo alcanza por red interna
    expose:
      - "3000"
    networks:
      - portfolio-net
      - backend_default

  nginx:
    image: nginx:1.27-alpine
    container_name: portfolio-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - portfolio_backend_certbot_certs:/etc/letsencrypt:ro
      - portfolio_backend_certbot_www:/var/www/certbot:ro
    depends_on:
      - frontend
    networks:
      - portfolio-net

networks:
  portfolio-net:
    driver: bridge
  backend_default:
    external: true
    name: portfolio_backend_default

volumes:
  portfolio_backend_certbot_certs:
    external: true
    name: portfolio_backend_certbot_certs
  portfolio_backend_certbot_www:
    external: true
    name: portfolio_backend_certbot_www
